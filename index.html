<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventory System</title>

<style>
table{
  width:100%;
  border-collapse:collapse;
  table-layout:auto;
  font-size:13px;
}

th, td{
  padding:6px 8px;
  border-bottom:1px solid #e5e7eb;
}

th{
  text-align:left;
  font-weight:600;
  font-size:13px;
}

td{
  white-space:nowrap;
  font-size:13px;
}

td:nth-child(4){
  text-align:center;
}

td:nth-child(5){
  text-align:right;
}

td:last-child{
  text-align:center;
}

/* Smaller action buttons */
button{
  font-size:12px;
  padding:3px 6px;
  margin:1px;
}
  input, textarea, select{
  text-transform: uppercase;
}
</style>
  <!-- XLSX Library -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
